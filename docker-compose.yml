services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: medilabo-postgres
    environment:
      POSTGRES_DB: demographics_db
      POSTGRES_USER: medilabo
      POSTGRES_PASSWORD: medilabo123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - medilabo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medilabo -d demographics_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Database
  mongodb:
    image: mongo:7-jammy
    container_name: medilabo-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: medilabo
      MONGO_INITDB_ROOT_PASSWORD: medilabo123
      MONGO_INITDB_DATABASE: notes_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - medilabo-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Demographics Microservice
  demographics:
    build:
      context: ./demographics
      dockerfile: Dockerfile
    container_name: medilabo-demographics
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/demographics_db
      SPRING_DATASOURCE_USERNAME: medilabo
      SPRING_DATASOURCE_PASSWORD: medilabo123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medilabo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/api/demographics/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Notes Microservice
  notes:
    build:
      context: ./notes
      dockerfile: Dockerfile
    container_name: medilabo-notes
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://medilabo:medilabo123@mongodb:27017/notes_db?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - medilabo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # API Gateway
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: medilabo-gateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: bWVkaWxhYm8tc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tMjAyNg==
    depends_on:
      - demographics
      - notes
      - frontend
    networks:
      - medilabo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Microservice
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medilabo-frontend
    ports:
      - "3000:3000"
    networks:
      - medilabo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  medilabo-network:
    driver: bridge

volumes:
  postgres-data:
  mongodb-data:
