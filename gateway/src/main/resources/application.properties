spring.application.name=gateway
server.port=8080

# ?? JWT Configuration ????????????????????????????????????????????????????????
# 256-bit secret (Base64-encoded). Override via env var JWT_SECRET in production.
jwt.secret=${JWT_SECRET:bWVkaWxhYm8tc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tMjAyNg==}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ?? Spring Cloud Gateway routes ??????????????????????????????????????????????

# Route 1: Demographics API  (/api/demographics/**)
spring.cloud.gateway.routes[0].id=demographics
spring.cloud.gateway.routes[0].uri=http://demographics:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/demographics/**

# Route 2: Notes API  (/api/notes/**)
spring.cloud.gateway.routes[1].id=notes
spring.cloud.gateway.routes[1].uri=http://notes:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/notes/**

# Route 3: Frontend (everything else)
spring.cloud.gateway.routes[2].id=frontend
spring.cloud.gateway.routes[2].uri=http://frontend:3000
spring.cloud.gateway.routes[2].predicates[0]=Path=/**

# ?? CORS ?????????????????????????????????????????????????????????????????????
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# ?? Actuator ?????????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true
